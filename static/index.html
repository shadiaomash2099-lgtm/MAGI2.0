<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>MAGI 众议系统 - 猫鼠议事厅</title>
    <style>
                /* --- MAGI 系统 CRT 显像管核心样式 --- */
        /* 1. 纯黑底色与等宽字体 */
        body { 
            background-color: #050505; 
            color: #ffaa00; /* 默认琥珀色荧光 */
            font-family: "Courier New", Courier, "Consolas", monospace; /* 终端打字机字体 */
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            position: relative;
        }

        /* 2. 军师秘技：全屏覆盖 CRT 扫描线与微弱闪烁感 */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none; /* 让扫描线不挡住鼠标点击 */
        }

        h1 { 
            color: #ff3300; 
            text-shadow: 0 0 10px #ff3300, 0 0 20px #ff0000; 
            letter-spacing: 5px; 
            text-transform: uppercase;
        }

        /* 3. 控制台面板：黑底红边，带着隐秘的呼吸光 */
        .control-panel { 
            background: #0a0a0a; 
            border: 1px solid #ff3300; 
            box-shadow: 0 0 10px rgba(255, 51, 0, 0.5), inset 0 0 10px rgba(255, 51, 0, 0.2);
            border-radius: 0; /* MAGI 不需要圆润的边角 */
            padding: 20px; 
            margin-bottom: 20px; 
            width: 80%; 
            max-width: 800px; 
            display: flex; 
            gap: 10px; 
        }

        /* 输入框与按钮：工业终端风 */
        input[type="text"], select { 
            flex-grow: 1; 
            padding: 10px; 
            background: #000;
            color: #ffaa00;
            border: 1px solid #ffaa00; 
            font-family: inherit;
            font-size: 16px; 
            outline: none; 
        }
        input[type="text"]:focus { box-shadow: 0 0 8px #ffaa00; }

        button { 
            background-color: #1a0000; 
            color: #ff3300; 
            border: 1px solid #ff3300; 
            padding: 10px 20px; 
            font-family: inherit;
            font-weight: bold;
            font-size: 16px; 
            cursor: pointer; 
            text-transform: uppercase;
            transition: all 0.2s; 
            box-shadow: 0 0 5px rgba(255, 51, 0, 0.4);
        }
        button:hover { background-color: #ff3300; color: #000; box-shadow: 0 0 15px #ff3300; }
        button:disabled { background-color: #333; color: #666; border-color: #555; box-shadow: none; cursor: not-allowed; }

        .battlefield { display: flex; width: 100%; max-width: 1200px; gap: 20px; height: 600px; }

        /* 战报区：取消白底，化为深渊 */
        .logs-area { 
            flex: 6; 
            background: #030303; 
            border: 1px solid #ffaa00; 
            padding: 20px; 
            overflow-y: auto; 
            box-shadow: inset 0 0 20px rgba(255, 170, 0, 0.1); 
        }

        .video-area { 
            flex: 4; 
            background: #000; 
            border: 1px solid #ff3300; 
            overflow: hidden; 
            box-shadow: 0 0 15px rgba(255, 51, 0, 0.3);
        }
        video { width: 100%; height: 100%; object-fit: cover; filter: contrast(1.2) saturate(1.5); /* 让猫和老鼠也带点失真感 */ }

        /* --- 核心修复：段落间距与气泡 --- */
        .log-entry { 
            margin-bottom: 15px; 
            padding: 10px 15px; 
            line-height: 1.5; 
            word-wrap: break-word;
            border-left: 4px solid; /* 左侧保留一条粗边标明身份 */
            background: rgba(20, 20, 20, 0.8);
        }

        /* 斩断多余的行距！ */
        .log-entry p { margin: 0.4em 0; }
        .log-entry h1, .log-entry h2, .log-entry h3 { margin-top: 0.5em; margin-bottom: 0.5em; color: inherit; }
        .log-entry ul, .log-entry ol { margin: 0.4em 0; padding-left: 20px; }

        /* 代码块：黑客帝国风 */
        .log-entry pre { background: #000; border: 1px solid currentColor; padding: 10px; overflow-x: auto; }
        .log-entry code { background: rgba(0,0,0,0.5); padding: 2px 4px; color: #00ff00; }

        /* --- MAGI 三贤人专属荧光色 (红/黄/橙) --- */
        .log-sys { border-left-color: #666; color: #888; text-shadow: none; font-size: 0.9em; }

        /* 梅尔基奥尔 (科学家) - 冰冷的琥珀黄 */
        .log-melchior { 
            border-left-color: #ffaa00; 
            color: #ffaa00; 
            text-shadow: 0 0 4px rgba(255, 170, 0, 0.6); 
        }

        /* 巴尔塔萨 (母亲) - 警示的血红 */
        .log-balthasar { 
            border-left-color: #ff3300; 
            color: #ff3300; 
            text-shadow: 0 0 4px rgba(255, 51, 0, 0.6); 
        }

        /* 卡斯帕 (直觉) - 刺眼的明黄 */
        .log-casper { 
            border-left-color: #ffff00; 
            color: #ffff00; 
            text-shadow: 0 0 5px rgba(255, 255, 0, 0.8); 
        }

        /* 督战台按钮颜色微调，融入深色系统 */
        #actionPanel button { margin-right: 10px; }
    </style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 亮为主公微调的 Markdown 样式库 */
        .log-entry { 
            margin-bottom: 12px; 
            padding: 15px; 
            border-radius: 12px; 
            line-height: 1.6; 
            /* 移除原有的 pre-wrap，交给 Markdown 引擎处理 */
            word-wrap: break-word;
        }
        /* 让 Markdown 里的代码块看起来更像军机处密函 */
        .log-entry pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
        }
        .log-entry code {
            font-family: 'Menlo', 'Monaco', monospace;
            background: rgba(0,0,0,0.05);
            padding: 2px 4px;
            border-radius: 4px;
        }
        /* 调整标题和列表的间距 */
        .log-entry h1, .log-entry h2, .log-entry h3 { margin-top: 0; }
        .log-entry ul, .log-entry ol { padding-left: 20px; }
    </style>
</head>
<body>

    <h1>MAGI 众议系统</h1>

    <div class="control-panel">
        <select id="tierSelect" style="padding: 10px; border-radius: 8px; border: 1px solid #d2d2d7; outline: none; font-size: 16px;">
            <option value="lite">Lite</option>
            <option value="pro">Pro</option>
        </select>
        
        <input type="text" id="topicInput" value="EVA是否被过誉了？" placeholder="输入辩论议题" style="padding: 10px; border-radius: 8px; border: 1px solid #d2d2d7; outline: none; font-size: 16px;">
        <button id="startBtn" onclick="startDebate()">启动辩论</button>
    </div>


<div class="battlefield">
        <div class="logs-area">
            <div id="logsContainer" style="height: 85%; overflow-y: auto; margin-bottom: 10px;">
                <div class="log-entry log-sys">MAGI在线...</div>
            </div>
            
            <div id="actionPanel" style="display: none; padding-top: 15px; border-top: 1px dashed #d2d2d7;">
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <button onclick="onContinue()" style="background-color: #34c759;">继续辩论</button>
                    <button onclick="onDirect()" style="background-color: #ff9500;">方向控制</button>
                    <button onclick="onArchive()" style="background-color: #5856d6;">归纳整理</button>
                </div>
                <div id="directionBox" style="display: none; display: flex; gap: 10px;">
                    <input type="text" id="directionInput" placeholder="输入新的辩论方向" style="flex-grow: 1; padding: 10px; border: 1px solid #d2d2d7; border-radius: 8px; outline: none; font-size: 16px;">
                    <button onclick="confirmDirection()" style="background-color: #0071e3;">调整方向</button>
                </div>
            </div>
        </div>

        <div class="video-area">
            <video id="catMouseVideo" loop muted playsinline>
                <source src="tom_and_jerry.mp4" type="video/mp4">
            </video>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
